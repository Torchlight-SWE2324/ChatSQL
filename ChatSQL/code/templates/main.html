<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pagina Utente</title>
</head>
<body>
<h1 align="center">Pagina Utente</h1>
            <form align="center" method="post">
                <label for="c">Select data base:</label><br>
                <select name="dbname" id="db">
                    <option value="">--Please choose an option--</option>
                    {% for db_name in data %}
                        <option value="{{ db_name }}">{{db_name}}</option>
                    {% endfor %}
                </select><br>
                <label for="lname">Enter your query:</label><br>
                <input type="text" id="lname" name="uquery" width="200" height="200">
                <input type="submit" value="Submit" width="200" height="200">
            </form>
</body>
</html>
